# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E Tests
#
# PURPOSE:
#   Runs the full Playwright test suite against the deployed production
#   environment on every push to main. Tests run inside the project's Docker
#   image (Node 20 + Playwright with all browsers pre-installed, see
#   ./Dockerfile) rather than installing dependencies directly on the runner.
#   Uploads the HTML report as an artifact so results can be reviewed
#   directly in the GitHub Actions UI.
#
# TRIGGER: push to main
#
# NOTES:
#   - Tests run against https://eventhub.rahulshettyacademy.com (live site)
#   - Chromium only (as configured in playwright.config.ts)
#   - HTML report is retained for 30 days as a downloadable artifact
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  push:
    branches: [main]

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: eventhub-tests

jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════
  # ║  Playwright Tests
  # ║  Builds the Docker image, runs all specs inside a container, and
  # ║  uploads the HTML report.
  # ╚═══════════════════════════════════════════════════════════════════════════
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Docker image ───────────────────────────────────────────────────
      # Image is Node 20 with Playwright and all browsers pre-installed (Dockerfile).
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      # ── Run Playwright tests inside the container ────────────────────────────
      # Tests run against the live site defined in playwright.config.ts.
      # playwright-report/ and test-results/ are bind-mounted so the HTML
      # report lands on the runner's filesystem for the upload step below.
      # continue-on-error ensures the artifact upload step always runs even
      # if tests fail.
      - name: Run Playwright tests in Docker container
        run: |
          mkdir -p playwright-report test-results
          docker run --rm \
            -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        continue-on-error: true

      # ── Upload HTML report as artifact ───────────────────────────────────────
      # The report is generated in playwright-report/ by the html reporter.
      # Retained for 30 days so the team can review results after a run.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
